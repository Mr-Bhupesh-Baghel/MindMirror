<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="MindMirror - Track your screen time and daily habits for a healthier digital lifestyle." />
  <meta name="author" content="MindMirror" />
  <title>MindMirror - Home</title>
  <link rel="stylesheet" href="src/styles/global.css" />
</head>

<body>
  
<video autoplay muted loop playsinline id="bg-video">
    <source src="videos/storm.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

  <div class="container">
    <header>
      <img src="src/assets/logo.png" alt="MindMirror Logo" class="logo" />
      <h1>MindMirror</h1>
      <p class="subtitle">Track your screen. Protect your mind.</p>
    </header>

    <section class="card">
      <iframe src="src/features/routine/routine.html" class="routine-preview-frame" title="Daily Routine Top Bar"></iframe>
      <h2>Daily Routine Tracker</h2>
      <div class="template-section">
        <a href="src/features/routine/routine.html" class="template-button" aria-label="Open Daily Routine Tracker">Open</a>
      </div>
    </section>

    <section class="habit-frames">
      <iframe src="src/features/workout/workout.html" class="habit-frame habit-frame-large" title="Pushups Tracker"></iframe>
      <iframe src="src/features/water/water.html" class="habit-frame habit-frame-small" title="Water Tracker"></iframe>
    </section>

    <section class="card feedback-card">
      <a href="src/features/feedback/feedback.html" class="template-button" aria-label="Open Feedback">Feedback</a>
    </section>

    <footer>
      <p>(c) 2026 MindMirror. All rights reserved.</p>
    </footer>
  </div>
</body>

</html>
