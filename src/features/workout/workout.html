<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-up Tracker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            color: #111;
            padding: 20px;
            overflow-x: hidden;
        }

        .prison-btn {
            width: 100%;
            min-height: 48px;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .prison-btn:hover {
            background: #1d4ed8;
            transform: scale(1.03);
        }

        iframe {
            display: block;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .prison-btn {
                border-radius: 10px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <button class="prison-btn" onclick="window.open('prison.html', '_blank')">
        💪 Prison Workout
    </button>

    <button style="background-color: #2564eb8f;" class="prison-btn" onclick="window.open('maintenance.html', '_blank')">
        🔥 Pushups Challenge
    </button>

    <button style="background-color: #2564eb37;" class="prison-btn" onclick="window.open('PushUp.html', '_blank')">
        📈 Pushups Tracker
    </button>
    <iframe src="maintenance.html" width="100%" height="500" style="border:none;" title="Pushups Tracker"></iframe>
    <iframe src="PushUp.html" width="100%" height="500" style="border:none;" title="Pushups Tracker"></iframe>
</body>

</html>
